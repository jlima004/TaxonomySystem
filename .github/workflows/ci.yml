name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  src:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --prefix src

      - name: Typecheck
        run: npm --prefix src run typecheck

      - name: Test
        run: npm --prefix src test

      - name: Alias integrity proof
        run: npm --prefix src run alias:integrity -- --json

      - name: Verify integrity proof
        run: npm --prefix src run verify:integrity -- --json
